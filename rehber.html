<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Görsel Prompt Rehberi</title>
<meta name="description" content="AI görsel üretim araçları için Türkçe açıklamalı prompt referans rehberi. Çekim açıları, kompozisyon, ışık, renk, lens, stiller, oranlar ve hazır formüller tek sayfada.">
<meta name="theme-color" content="#01696f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

:root, [data-theme="light"] {
  --bg: #f7f6f2; --surface: #ffffff; --surface-2: #f2f0ec;
  --border: rgba(0,0,0,0.09); --text: #1a1916; --text-muted: #6b6a66;
  --text-faint: #b0afa9; --accent: #01696f; --accent-light: #e0edec;
  --accent-hover: #0c4e54; --tag-bg: #eef8f7; --tag-text: #01696f;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 12px;
}
[data-theme="dark"] {
  --bg: #141312; --surface: #1e1c1a; --surface-2: #252320;
  --border: rgba(255,255,255,0.08); --text: #d4d3d0; --text-muted: #7a7974;
  --text-faint: #4a4946; --accent: #4f98a3; --accent-light: #1d2b2c;
  --accent-hover: #61b0bc; --tag-bg: #1d2b2c; --tag-text: #4f98a3;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
}

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 16px 28px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { color: white; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 17px; line-height: 1.1; }
.header-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
.theme-btn {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 50px;
  padding: 7px 12px; cursor: pointer; color: var(--text-muted);
  transition: all 180ms ease; display: flex; align-items: center; gap: 6px; font-size: 13px;
}
.theme-btn:hover { background: var(--accent-light); color: var(--accent); }

.hero {
  background: linear-gradient(140deg, #014a4e 0%, #01696f 50%, #0a8a8f 100%);
  padding: 44px 28px 36px; color: white; text-align: center;
}
.hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(22px,4vw,38px); font-weight: 400; margin-bottom: 8px; }
.hero p { font-size: 14px; opacity: 0.82; max-width: 520px; margin: 0 auto 22px; }
.formula-pill {
  display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 50px; padding: 10px 20px;
}
.formula-pill span { background: rgba(255,255,255,0.15); border-radius: 50px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
.formula-pill .plus { opacity: 0.5; font-size: 14px; }

.nav-tabs {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 13px 15px; font-size: 13px; font-weight: 500; color: var(--text-muted);
  border: none; background: none; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: all 180ms ease;
}
.nav-tab:hover { color: var(--accent); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main { max-width: 1160px; margin: 0 auto; padding: 28px 20px 64px; }
.section { display: none; }
.section.active { display: block; }

.section-intro {
  background: var(--accent-light); border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 24px;
  font-size: 13px; color: var(--text);
}

.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px,100%),1fr));
  gap: 18px; margin-bottom: 28px;
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm);
  transition: box-shadow 200ms ease, transform 200ms ease;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.card-img {
  width: 100%; height: 190px; object-fit: cover; display: block; background: var(--surface-2);
  transition: transform 300ms ease;
}
.card:hover .card-img { transform: scale(1.03); }
.card-img-wrap { overflow: hidden; position: relative; }

.card-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.62); color: white; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 50px; letter-spacing: 0.04em; backdrop-filter: blur(4px);
  text-transform: uppercase;
}

.card-body { padding: 15px; }
.card-en { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
.card-tr { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: 5px; line-height: 1.2; }
.card-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
.card-prompt {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 11.5px; font-family: monospace; color: var(--text);
  display: flex; align-items: flex-start; gap: 6px;
}
.prompt-lbl { font-size: 9px; font-family: 'DM Sans', sans-serif; color: var(--text-faint); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; margin-top: 2px; }
.card-use { font-size: 11px; color: var(--text-faint); margin-top: 8px; font-style: italic; }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 28px; overflow-x: auto; }
.cmp-table { width: 100%; border-collapse: collapse; }
.cmp-table th { background: var(--surface-2); padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
.cmp-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.cmp-table tr:last-child td { border-bottom: none; }
.cmp-table tr:hover td { background: var(--surface-2); }
.en-code { font-family: monospace; color: var(--accent); font-weight: 600; font-size: 12px; }
.use-tag { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 7px; border-radius: 50px; display: inline-block; }

.neg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; margin-bottom: 28px; }
.neg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); }
.neg-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px; }
.neg-terms { display: flex; flex-wrap: wrap; gap: 5px; }
.neg-tag { background: #fff1f0; color: #c0392b; font-size: 10.5px; font-family: monospace; padding: 3px 7px; border-radius: 4px; border: 1px solid rgba(192,57,43,0.12); }
[data-theme="dark"] .neg-tag { background: #2a1a19; color: #e87068; border-color: rgba(232,112,104,0.2); }

.ratio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 14px; margin-bottom: 28px; }
.ratio-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 14px; box-shadow: var(--shadow-sm); text-align: center; }
.ratio-visual { margin: 0 auto 10px; background: var(--accent-light); border: 2px solid var(--accent); border-radius: 4px; }
.ratio-value { font-family: monospace; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
.ratio-name { font-size: 12px; color: var(--text); font-weight: 600; margin-bottom: 3px; }
.ratio-use { font-size: 11px; color: var(--text-muted); }

.formula-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; box-shadow: var(--shadow-sm); }
.formula-box h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 16px; }
.f-parts { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 18px; }
.f-part { background: var(--accent-light); color: var(--accent); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.f-plus { color: var(--text-faint); font-size: 18px; }
.example-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12.5px; line-height: 1.7; }
.ex-label { font-size: 10px; color: var(--text-faint); font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 700; }

.section-h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 8px; margin-top: 32px; }
.section-h2:first-child { margin-top: 0; }
.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-faint); border-top: 1px solid var(--border); }


/* ===== Kompozisyon Diyagram Kartları ===== */
.comp-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(300px,100%), 1fr));
  gap: 20px;
  margin-bottom: 28px;
}
.comp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 200ms ease, transform 200ms ease;
}
.comp-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.comp-diagram-wrap {
  width: 100%;
  background: #0d1117;
  position: relative;
  overflow: hidden;
}
.comp-diagram-wrap svg { width: 100%; height: auto; display: block; }
.comp-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.72); color: white;
  font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 50px;
  letter-spacing: 0.04em; backdrop-filter: blur(4px);
  text-transform: uppercase; z-index: 2;
}
.comp-card-body { padding: 15px; }
.comp-card-en { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 2px; }
.comp-card-tr { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
.comp-card-desc { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.55; }
.comp-card-prompt { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 11.5px; font-family: monospace; color: var(--text); display: flex; align-items: flex-start; gap: 6px; }
.comp-card-tip { font-size: 11px; color: var(--text-faint); margin-top: 8px; font-style: italic; }
.diag-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--accent);
  margin-top: 22px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.diag-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }


/* ===== Tek Seferde Bakın Kutusu ===== */
.overview-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
}
.overview-header {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.overview-sub {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.55;
  max-width: 72ch;
}

/* ===== İnfografik & Diyagram Bölüm CSS ===== */
.comp-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
  margin-bottom: 28px;
}
.comp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}
.comp-diagram-wrap {
  position: relative;
  background: #1a2035;
  overflow: hidden;
}
.comp-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(1,105,111,0.85);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  z-index: 2;
  font-family: monospace;
}
.comp-card-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}
.comp-card-en {
  font-size: 12px;
  font-family: monospace;
  color: var(--accent);
  font-weight: 700;
}
.comp-card-tr {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.comp-card-desc {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.55;
}
.comp-card-prompt {
  font-size: 11px;
  font-family: monospace;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  color: var(--text-muted);
  margin-top: 4px;
}
.comp-card-tip {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 2px;
}
.section-h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin: 24px 0 12px 0;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.table-wrap {
  overflow-x: auto;
  margin-bottom: 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
}
.cmp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.cmp-table th {
  background: var(--surface-offset);
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  white-space: nowrap;
}
.cmp-table td {
  padding: 9px 12px;
  border-top: 1px solid var(--border);
  line-height: 1.5;
  color: var(--text);
}
.cmp-table tr:hover td { background: var(--surface-offset); }
.en-code {
  font-family: monospace;
  font-size: 11px;
  color: var(--accent);
}
.poster-grid { }
@media (max-width: 600px) {
  .poster-grid { grid-template-columns: 1fr !important; }
  .comp-cards-grid { grid-template-columns: 1fr; }
}
.neg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.neg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.neg-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

/* ===== Yeni Kabuk & Etkileşimler ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at top left, rgba(1, 105, 111, 0.14), transparent 28%),
    radial-gradient(circle at top right, rgba(232, 114, 12, 0.08), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,0.18), transparent 12%);
  z-index: -1;
}

[data-theme="dark"] body::before {
  background:
    radial-gradient(circle at top left, rgba(79, 152, 163, 0.18), transparent 30%),
    radial-gradient(circle at top right, rgba(232, 114, 12, 0.08), transparent 22%),
    linear-gradient(180deg, rgba(255,255,255,0.03), transparent 14%);
}

.header {
  backdrop-filter: blur(18px);
  background: color-mix(in srgb, var(--surface) 86%, transparent);
}

.hero {
  position: relative;
  overflow: hidden;
  padding-bottom: 30px;
}

.hero::before,
.hero::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  filter: blur(10px);
  opacity: 0.22;
}

.hero::before {
  width: 280px;
  height: 280px;
  right: -80px;
  top: -80px;
  background: #f4d35e;
}

.hero::after {
  width: 220px;
  height: 220px;
  left: -70px;
  bottom: -120px;
  background: #5ac8cb;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 1160px;
  margin: 0 auto;
}

.hero-copy {
  max-width: 720px;
  margin: 0 auto;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin: 24px auto 0;
  max-width: 860px;
}

.stat-card {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 16px;
  padding: 15px 16px;
  text-align: left;
  backdrop-filter: blur(10px);
}

.stat-value {
  display: block;
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.76;
}

.toolbar {
  position: sticky;
  top: 65px;
  z-index: 95;
  padding: 16px 20px 0;
}

.toolbar-inner {
  max-width: 1160px;
  margin: 0 auto;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  border-radius: 18px;
  padding: 14px;
  display: grid;
  gap: 12px;
  backdrop-filter: blur(14px);
}

.toolbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.search-shell {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: min(100%, 380px);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
}

.search-shell svg {
  color: var(--text-muted);
  flex-shrink: 0;
}

.search-input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
  color: var(--text);
  font: inherit;
}

.toolbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.ghost-btn,
.share-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
}

.ghost-btn:hover,
.share-btn:hover {
  transform: translateY(-1px);
  border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
  background: var(--accent-light);
}

.toggle-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

.toggle-pill input {
  accent-color: var(--accent);
}

.toolbar-note {
  font-size: 12px;
  color: var(--text-muted);
}

.toolbar-note mark {
  background: color-mix(in srgb, var(--accent) 20%, transparent);
  color: inherit;
  padding: 0 4px;
  border-radius: 4px;
}

.section {
  scroll-margin-top: 190px;
}

.section.active {
  animation: fadeUp 220ms ease;
}

.section.is-hidden-by-search {
  display: none !important;
}

body[data-expanded="true"] .section {
  display: block;
}

body[data-expanded="true"] .section + .section {
  margin-top: 34px;
  padding-top: 6px;
}

body[data-expanded="true"] .section.active {
  animation: none;
}

body[data-expanded="true"] .nav-tab.active {
  border-bottom-color: transparent;
}

.nav-tab.matching {
  color: var(--accent);
}

.copy-btn {
  margin-left: auto;
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  border-radius: 999px;
  font-size: 10px;
